; Per-vhost PHP config for this app's HTTP requests only.
;
; PHP-FPM reads .user.ini per-directory (cached for 5 min by default) and
; applies its directives ONLY to requests served from this document root.
; Other vhosts on the same FPM pool (Tripsquick, Settle, etc.) are not
; affected — they don't have this file, so they inherit the global
; date.timezone from /www/server/php/83/etc/php.ini (Europe/Berlin).
;
; Why we override: the resolver math + on-chain createRound timestamps
; assume UTC everywhere; running the app on Berlin (CEST = +02:00) caused
; round opens_at to drift 2h between intent and storage.
date.timezone = UTC
