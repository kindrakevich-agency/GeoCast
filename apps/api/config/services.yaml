# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    app.redis_url: '%env(REDIS_URL)%'
    # Every Redis key written by this app is prefixed with this string. The
    # Hetzner box runs ONE Redis shared across multiple projects (Tripsquick,
    # Settle, karpaty, GeoCast). Namespacing per-project prevents collisions.
    app.redis_prefix: 'geocast:'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    # ---------- Redis (Predis) ----------
    # Single shared Predis client, prefixed so no other project's keys can
    # ever collide with ours. App code injects Predis\Client and never
    # writes a key without going through this client.
    Predis\Client:
        arguments:
            $parameters: '%app.redis_url%'
            $options:
                prefix: '%app.redis_prefix%'

    # ---------- SIWE ----------
    App\Service\Siwe\SiweVerifier:
        arguments:
            $allowedChainIdsCsv: '%env(SIWE_ALLOWED_CHAIN_IDS)%'

    # ---------- User provisioning ----------
    App\Service\User\UserProvisioner:
        arguments:
            $adminWalletsCsv: '%env(ADMIN_WALLETS)%'

    # ---------- Pusher (real-time) ----------
    # Scalar string args can't autowire — Symfony has no way to map
    # `string $appId` to the right env var. Explicit binding required;
    # when any of the three is empty the broadcaster falls back to silent
    # no-op mode (and /api/pusher/auth returns 503 with a clear message).
    App\Service\Broadcast\PusherBroadcaster:
        arguments:
            $appId:   '%env(PUSHER_APP_ID)%'
            $key:     '%env(PUSHER_KEY)%'
            $secret:  '%env(PUSHER_SECRET)%'
            $cluster: '%env(PUSHER_CLUSTER)%'
