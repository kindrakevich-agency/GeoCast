lexik_jwt_authentication:
    secret_key: '%env(resolve:JWT_SECRET_KEY)%'
    public_key: '%env(resolve:JWT_PUBLIC_KEY)%'
    pass_phrase: '%env(JWT_PASSPHRASE)%'
    # 30 days. Portfolio demo, not banking — long-lived tokens keep the UX
    # frictionless across visits. The frontend auto-clears stale tokens on
    # 401, so a key rotation still recovers cleanly.
    token_ttl: 2592000
