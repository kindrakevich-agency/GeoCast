security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        # SIWE-derived users — loaded by wallet address from the DB.
        app_user_provider:
            id: App\Security\WalletUserProvider

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        # Public sub-firewall — no auth required, no Lexik intervention.
        # Covers nonce/verify (the JWT issuance flow), health, and
        # read-only round/leaderboard endpoints.
        api_public:
            pattern: ^/(auth|health|rounds$|rounds/[^/]+$|leaderboard)
            stateless: true
            security: false

        # Everything else under /api is JWT-protected.
        api:
            pattern: ^/
            stateless: true
            provider: app_user_provider
            jwt: ~

    # Note: only the first matching rule is applied.
    access_control:
        # Belt-and-suspenders — even if a route slips through the public
        # firewall, the public paths stay accessible without a token.
        - { path: ^/auth, roles: PUBLIC_ACCESS }
        - { path: ^/health, roles: PUBLIC_ACCESS }
        # JWT-required endpoints fall back to ROLE_USER at the access layer.
        # The firewall above is what actually drives the 401.

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
