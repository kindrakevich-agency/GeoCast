security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        # SIWE-derived users — loaded by wallet address from the DB.
        app_user_provider:
            id: App\Security\WalletUserProvider

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        # Public sub-firewall — no auth required, no Lexik intervention.
        # Covers nonce/verify (the JWT issuance flow), health, and
        # read-only round/leaderboard endpoints.
        api_public:
            pattern: ^/(auth|health|rounds$|rounds/[^/]+$|leaderboard)
            stateless: true
            security: false

        # Everything else under /api is JWT-protected.
        api:
            pattern: ^/
            stateless: true
            provider: app_user_provider
            jwt: ~

    # Note: only the first matching rule is applied. The `jwt:` authenticator
    # parses tokens when present but does NOT reject anonymous requests —
    # access_control is what enforces "this URL requires auth".
    access_control:
        # Public — explicitly listed first so they're not caught by the catch-all
        - { path: ^/auth, roles: PUBLIC_ACCESS }
        - { path: ^/health, roles: PUBLIC_ACCESS }
        - { path: ^/rounds/current$, roles: PUBLIC_ACCESS }
        - { path: ^/leaderboard, roles: PUBLIC_ACCESS }
        # Admin namespace
        - { path: ^/admin, roles: ROLE_ADMIN }
        # Everything else under /api requires a valid JWT (ROLE_USER)
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
