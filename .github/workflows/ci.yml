name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Never let two deploys race the same /www/wwwroot working tree.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Node 20 was deprecated on GH Actions runners — force JS actions onto Node 24.
# Safe with v6+ of the official actions below; keeps us on the latest stack.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.29.2

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm --filter ./apps/web typecheck

      - name: Build
        run: pnpm --filter ./apps/web build

  php:
    name: PHP — lint + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, bcmath, gmp, intl, mbstring, redis, opcache, zip
          tools: composer:v2
          coverage: none
      - name: Validate composer.json
        working-directory: apps/api
        run: composer validate --strict --no-check-publish
      - name: Cache vendor/
        uses: actions/cache@v5
        with:
          path: apps/api/vendor
          key: composer-${{ hashFiles('apps/api/composer.lock', 'apps/api/composer.json') }}
      - name: composer install
        working-directory: apps/api
        run: composer install --prefer-dist --no-interaction --no-progress --no-scripts
      - name: Lint YAML
        working-directory: apps/api
        run: php bin/console lint:yaml config --parse-tags
      - name: Lint container
        working-directory: apps/api
        env:
          APP_ENV: test
          APP_SECRET: ci_test_secret_not_real_aaaaaaaaaaaaaaa
          DATABASE_URL: 'mysql://test:test@127.0.0.1:3306/test?serverVersion=10.11.0-MariaDB'
          REDIS_URL: 'redis://127.0.0.1:6379'
          JWT_PASSPHRASE: ci_jwt_not_real
        run: php bin/console lint:container
      - name: PHPUnit (skipped if no tests yet)
        if: hashFiles('apps/api/phpunit.xml.dist', 'apps/api/phpunit.xml', 'apps/api/tests/**/*.php') != ''
        working-directory: apps/api
        env:
          APP_ENV: test
          APP_SECRET: ci_test_secret_not_real_aaaaaaaaaaaaaaa
          DATABASE_URL: 'mysql://test:test@127.0.0.1:3306/test?serverVersion=10.11.0-MariaDB'
          REDIS_URL: 'redis://127.0.0.1:6379'
        run: vendor/bin/phpunit --testdox || echo "(no tests yet)"

  deploy:
    name: Deploy to production
    needs: [frontend, php]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Optional — when unset, WalletConnect falls back to the geocast-dev
      # placeholder which works for injected wallets but blackholes WC's
      # analytics + remote-config endpoints (harmless 403/400 console noise).
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          # Pass the WalletConnect projectId through to the SSH session so
          # the frontend build can bake it into the JS bundle.
          envs: NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID
          script: |
            set -e
            APP_DIR=/www/wwwroot/geocast.kindrakevich.com
            NODE_PID=/www/server/nodejs/vhost/pids/geocast.pid
            NODE_SCRIPT=/www/server/nodejs/vhost/scripts/geocast.sh
            PHP=/www/server/php/83/bin/php
            COMPOSER=/usr/local/bin/composer

            echo "=== Pull latest code ==="
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            echo "=== Backend (Symfony): composer install ==="
            cd apps/api
            $PHP $COMPOSER install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-scripts

            echo "=== Backend: cache:clear + warmup ==="
            rm -rf var/cache/prod
            APP_ENV=prod $PHP bin/console cache:clear --no-warmup
            APP_ENV=prod $PHP bin/console cache:warmup
            chown -R www:www var/

            echo "=== Backend: generate JWT keypair if missing ==="
            APP_ENV=prod $PHP bin/console lexik:jwt:generate-keypair --skip-if-exists --no-interaction || true
            chown -R www:www config/jwt 2>/dev/null || true

            echo "=== Backend: migrations ==="
            APP_ENV=prod $PHP bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration

            echo "=== Backend: restart PHP-FPM 8.3 (clear opcache) ==="
            /etc/init.d/php-fpm-83 restart

            echo "=== Frontend: install + build ==="
            cd "$APP_DIR"
            corepack enable
            corepack prepare pnpm@10.29.2 --activate
            pnpm install --frozen-lockfile
            NEXT_PUBLIC_API_URL=https://geocast.kindrakevich.com/api \
            NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID="$NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID" \
              pnpm --filter ./apps/web build

            echo "=== Permissions ==="
            chown -R www:www apps/web/.next 2>/dev/null || true

            echo "=== Restart Node project (managed by aaPanel) ==="
            if [ -f "$NODE_PID" ]; then
              kill "$(cat "$NODE_PID")" 2>/dev/null || true
              sleep 2
            fi
            bash "$NODE_SCRIPT"
            sleep 4
            curl -sf -o /dev/null http://127.0.0.1:3010/ && echo "✓ web serving on :3010" || (echo "✗ web not responding" && tail -20 /www/wwwlogs/nodejs/geocast.log && exit 1)
            curl -sf -o /dev/null http://127.0.0.1/api/health -H 'Host: geocast.kindrakevich.com' && echo "✓ api/health responding" || echo "(api/health not yet wired — controllers come in next commit)"

            # Backend hooks (no-op until apps/api implementation begins):
            # PHP=/www/server/php/83/bin/php
            # cd "$APP_DIR/apps/api" && $PHP /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction
            # APP_ENV=prod $PHP bin/console cache:clear --no-warmup && APP_ENV=prod $PHP bin/console cache:warmup
            # chown -R www:www var/ && APP_ENV=prod $PHP bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration
            # /etc/init.d/php-fpm-83 restart

            echo "=== Deploy complete ==="
